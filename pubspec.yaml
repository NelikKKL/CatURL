name: caturl
description: A beautiful Material You URL file opener and creator.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dynamic_color: 1.7.0
  url_launcher: ^6.3.0
  file_picker: ^8.0.0
  share_plus: ^10.0.0
  path_provider: ^2.1.0
  shared_preferences: ^2.3.0
  intl: ^0.19.0
  flutter_animate: ^4.5.0
  permission_handler: ^11.3.0
  open_filex: ^4.5.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
